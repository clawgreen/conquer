# Conquer — Local Development (T436)
# Usage: docker compose up
#
# Server: http://localhost:3000
# pgAdmin: http://localhost:5050 (admin@conquer.local / admin)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: conquer
      POSTGRES_USER: conquer
      POSTGRES_PASSWORD: conquer_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./conquer-db/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conquer -d conquer"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: "postgresql://conquer:conquer_dev_password@postgres:5432/conquer"
      JWT_SECRET: "conquer-local-dev-secret-not-for-production"
      RUST_LOG: "info,conquer_server=debug"
      CORS_ORIGIN: "http://localhost:3000,http://localhost:5173"
      STATIC_DIR: "/app/dist"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@conquer.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  pgdata:
